<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>闲笔 — 个人博客</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --ink: #2c241a;
  --ink-soft: #5c5040;
  --ink-muted: #8a7e6e;
  --page: #faf6ee;
  --page-warm: #f3ece0;
  --accent: #c1663a;
  --accent-dim: #a0502a;
  --accent-glow: #e8a87c;
  --hairline: #e5d9c6;
  --radius-s: 4px;
  --radius-m: 8px;
  --font-serif: 'Noto Serif SC','Source Han Serif SC','STSong','SimSun',serif;
  --font-sans: 'Noto Sans SC','PingFang SC','Hiragino Sans GB',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:clamp(15px,1.05vw+0.35rem,18px);-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-sans);
  background:var(--page);
  color:var(--ink);
  line-height:1.75;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--accent);text-decoration:none;transition:color .2s}
a:hover{color:var(--accent-dim)}

/* Nav */
.site-nav{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(180deg,var(--page) 60%,transparent);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  padding:clamp(0.8rem,2vh,1.2rem) clamp(1rem,4vw,2rem);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid transparent;
  transition:border-color .3s,background .3s;
}
.site-nav.scrolled{border-bottom-color:var(--hairline);background:var(--page)}
.site-title{
  font-family:var(--font-serif);
  font-size:clamp(1.2rem,2.5vw,1.6rem);
  font-weight:700;color:var(--ink);
  letter-spacing:-.01em;
}
.nav-links{display:flex;gap:clamp(0.8rem,2vw,1.5rem);font-size:0.9rem}
.nav-links a{color:var(--ink-soft);position:relative}
.nav-links a.active{color:var(--ink)}
.nav-links a::after{
  content:'';position:absolute;bottom:-4px;left:0;width:0;height:1.5px;
  background:var(--accent);transition:width .25s ease;
}
.nav-links a.active::after,.nav-links a:hover::after{width:100%}

/* Layout */
.container{
  max-width:720px;margin:0 auto;
  padding:clamp(1.5rem,4vw,3rem) clamp(1rem,4vw,2rem);
}

/* Hero */
.hero{
  padding:clamp(2rem,6vh,4rem) 0 clamp(1.5rem,4vh,3rem);
  text-align:left;
}
.hero h1{
  font-family:var(--font-serif);
  font-size:clamp(1.8rem,5vw,2.8rem);
  font-weight:700;line-height:1.25;
  color:var(--ink);letter-spacing:-.02em;
}
.hero p{
  color:var(--ink-soft);margin-top:.5rem;
  font-size:clamp(.95rem,2vw,1.1rem);
  max-width:480px;
}

/* Tag filter */
.tag-bar{
  display:flex;flex-wrap:wrap;gap:.5rem;
  margin-bottom:clamp(1.5rem,3vh,2.5rem);
}
.tag-chip{
  padding:.35em .85em;border-radius:20px;
  font-size:.82rem;cursor:pointer;
  border:1px solid var(--hairline);
  background:var(--page);color:var(--ink-soft);
  transition:all .2s;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.tag-chip:hover{background:var(--page-warm);color:var(--ink)}
.tag-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Article list */
.article-list{display:flex;flex-direction:column;gap:clamp(1.2rem,3vh,2rem)}
.article-card{
  padding:clamp(1rem,2.5vh,1.5rem) 0;
  border-bottom:1px solid var(--hairline);
  cursor:pointer;transition:opacity .2s;
  -webkit-tap-highlight-color:transparent;
}
.article-card:last-child{border-bottom:none}
.article-card:hover .article-title{color:var(--accent)}
.article-meta{
  display:flex;align-items:center;gap:.75rem;
  font-size:.78rem;color:var(--ink-muted);
  margin-bottom:.35rem;flex-wrap:wrap;
}
.article-meta-tags{display:flex;gap:.35rem;flex-wrap:wrap}
.article-meta-tags span{
  font-size:.72rem;padding:.1em .55em;
  border-radius:3px;background:var(--page-warm);color:var(--ink-muted);
}
.article-title{
  font-family:var(--font-serif);
  font-size:clamp(1.1rem,2.5vw,1.35rem);
  font-weight:600;color:var(--ink);
  line-height:1.4;margin-bottom:.25rem;
  transition:color .2s;
}
.article-excerpt{
  color:var(--ink-soft);font-size:.88rem;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
}

/* Article detail */
.article-detail{animation:fadeUp .35s ease both}
.article-detail .article-title{
  font-size:clamp(1.5rem,4vw,2rem);margin-bottom:.5rem;
}
.article-detail .article-meta{margin-bottom:1.5rem}
.article-body{
  font-family:var(--font-serif);
  font-size:clamp(.95rem,2vw,1.05rem);
  line-height:1.9;color:var(--ink);
}
.article-body p{margin-bottom:1.2em}
.article-body h2{
  font-size:1.25em;font-weight:700;margin:1.8em 0 .6em;
  color:var(--ink);
}
.article-body h3{font-size:1.1em;font-weight:600;margin:1.5em 0 .4em}
.article-body blockquote{
  margin:1.2em 0;padding:.6em 1.2em;
  border-left:3px solid var(--accent);
  background:var(--page-warm);
  color:var(--ink-soft);font-size:.95em;
}
.article-body code{
  font-family:'JetBrains Mono','Fira Code',monospace;
  font-size:.88em;background:var(--page-warm);
  padding:.15em .4em;border-radius:3px;
}
.article-body pre{
  overflow-x:auto;padding:1em 1.2em;margin:1.2em 0;
  background:#2c241a;color:#e8d5b0;border-radius:var(--radius-m);
  font-size:.82em;line-height:1.6;
}
.article-body pre code{background:none;padding:0;color:inherit}
.article-body ul,.article-body ol{padding-left:1.5em;margin:.8em 0}
.article-body li{margin:.3em 0}
.article-body img{max-width:100%;border-radius:var(--radius-m);margin:1em 0}
.article-body a{text-decoration:underline;text-underline-offset:2px}
.back-btn{
  display:inline-flex;align-items:center;gap:.4em;
  color:var(--ink-soft);font-size:.85rem;margin-bottom:1.5rem;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:color .2s;
}
.back-btn:hover{color:var(--ink)}
.back-btn svg{width:16px;height:16px}

/* About */
.about-section{animation:fadeUp .35s ease both}
.about-section h2{
  font-family:var(--font-serif);
  font-size:clamp(1.4rem,3.5vw,1.8rem);
  font-weight:700;margin-bottom:1rem;
}
.about-section p{margin-bottom:.8em;color:var(--ink-soft);max-width:560px}
.about-section .highlight{
  color:var(--accent);font-weight:500;
}

/* States */
.empty-state{
  text-align:center;padding:3rem 1rem;
  color:var(--ink-muted);
}
.empty-state p{font-size:.9rem}
.loading-state{
  display:flex;justify-content:center;padding:3rem;
}
.skeleton{
  width:100%;height:5rem;border-radius:var(--radius-m);
  background:linear-gradient(90deg,var(--hairline) 25%,var(--page-warm) 50%,var(--hairline) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;
}

/* Footer */
.site-footer{
  text-align:center;padding:2rem 1rem;
  color:var(--ink-muted);font-size:.78rem;
  border-top:1px solid var(--hairline);
}
.version-badge{opacity:.5;margin-left:.5em}

/* Animations */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important}
}

/* Responsive */
@media(min-width:768px){
  .container{max-width:680px}
  .article-card{padding:1.5rem 0}
}
</style>
</head>
<body>
<nav class="site-nav" id="siteNav">
  <a href="#" class="site-title" onclick="showHome()">闲笔</a>
  <div class="nav-links">
    <a href="#" class="active" onclick="showHome()" data-nav="home">文章</a>
    <a href="#" onclick="showAbout()" data-nav="about">关于</a>
  </div>
</nav>

<main class="container" id="mainContent"></main>

<footer class="site-footer">
  <span>闲笔 — 个人博客</span><span class="version-badge">v1.0</span>
</footer>

<script>
// ============ DATA ============
const ARTICLES = [
  {
    id:1,title:'写在前面的话',
    date:'2026-06-15',tags:['随笔'],
    excerpt:'搭建这个博客的初衷很简单——找一个安静的地方，把想到的东西写下来。不需要流量，不需要读者，只需要一个属于自己的角落。',
    content:`## 为什么要写博客

在这个信息爆炸的时代，每个人都在消费内容，却很少有人创造内容。我决定反其道而行之。

## 我的写作原则

1. **真实** — 不为了迎合而写，只写自己相信的东西
2. **简洁** — 能用一句话说清的，不用一段话
3. **持续** — 不求频率，但求不间断

## 技术选型

这个博客用纯 HTML/CSS/JS 搭建，Markdown 渲染用的 marked.js。没有框架，没有构建工具，打开就能用。

---

如果你碰巧读到这些文字，谢谢你。`
  },
  {
    id:2,title:'理解异步编程：从回调到 async/await',
    date:'2026-06-10',tags:['技术','JavaScript'],
    excerpt:'异步编程是 JavaScript 的核心话题。本文从回调函数讲起，一步步推导到 Promise 和 async/await，帮你真正理解异步的本质。',
    content:`## 回调函数时代

最早的异步处理方式是回调函数：

\`\`\`javascript
fs.readFile('file.txt', (err, data) => {
  if (err) throw err;
  console.log(data);
});
\`\`\`

问题很快暴露：回调地狱。

## Promise 的诞生

Promise 把异步操作包装成一个对象：

\`\`\`javascript
fetch('/api')
  .then(res => res.json())
  .then(data => console.log(data))
  .catch(err => console.error(err));
\`\`\`

链式调用让代码可读性大幅提升。

## async/await — 语法糖的革命

\`\`\`javascript
async function loadData() {
  try {
    const res = await fetch('/api');
    const data = await res.json();
    console.log(data);
  } catch (err) {
    console.error(err);
  }
}
\`\`\`

本质上仍是 Promise，但写法更接近同步代码。

## 总结

| 方案 | 优点 | 缺点 |
|------|------|------|
| 回调 | 简单直接 | 回调地狱 |
| Promise | 链式调用 | 仍需.then |
| async/await | 可读性最佳 | 需要理解底层 |

选择哪种取决于你的场景，但大多数情况下 async/await 是最佳选择。`
  },
  {
    id:3,title:'CSS 新特性：has() 选择器的实用场景',
    date:'2026-06-05',tags:['技术','CSS'],
    excerpt:':has() 被称为"CSS 的父选择器"，虽然名字叫 has 但实际上能干的事远不止于此。看看几个真实项目中的实用场景。',
    content:`## 什么是 :has()

\`:has()\` 是一个关系选择器，可以选择包含特定子元素的父元素：

\`\`\`css
/* 含有图片的段落增加间距 */
p:has(img) { margin-bottom: 2em; }
\`\`\`

## 实用场景

### 1. 父级状态联动

\`\`\`css
.card:has(button:hover) {
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}
\`\`\`

### 2. 空状态检测

\`\`\`css
.list:has(:empty) { display: none; }
\`\`\`

### 3. 表单验证反馈

\`\`\`css
.form-group:has(input:invalid) {
  border-color: #e74c3c;
}
\`\`\`

### 4. 相邻元素样式

\`\`\`css
h2:has(+ p) { margin-bottom: 0.25em; }
\`\`\`

## 浏览器支持

目前所有现代浏览器均已支持，可以放心在生产环境使用。

\`:has()\` 打开了 CSS 中一直缺失的一扇门——根据子元素状态向上影响父元素。善用它，你的 CSS 会更简洁。`
  },
  {
    id:4,title:'如何构建有效的阅读习惯',
    date:'2026-05-28',tags:['随笔','效率'],
    excerpt:'读了三年书，试过各种阅读方法，最终发现最有用的不是什么速读技巧，而是几个简单到容易忽略的习惯。',
    content:`## 我的阅读经历

三年前我开始认真读书，每年大约 50 本。这个数字不算多，但每本都有笔记，大部分能回忆起核心内容。

## 有效的方法

### 1. 固定时段

每天睡前一小时，手机放隔壁房间，只留一本书和一盏灯。

### 2. 读完就写

不是写长篇书评，三句话即可——这本书讲了什么、我同意什么、我不同意什么。

### 3. 允许放弃

一本书读 50 页还不感兴趣，果断放弃。时间比"读完"重要。

## 无效的方法

- 速读课 — 理解比速度重要
- 同时读多本书 — 分散注意力
- 只看畅销榜 — 好书不在榜单上

阅读是一场马拉松，不是短跑。慢慢来。`
  },
  {
    id:5,title:'Git 工作流实践：从混乱到有序',
    date:'2026-05-20',tags:['技术','工具'],
    excerpt:'团队协作中，Git 分支管理往往一团糟。分享一下我们团队从"随意提交"到规范化工作流的演变过程。',
    content:`## 混乱的起点

最初的提交记录长这样：

\`\`\`
fix bug
fix bug again
really fix bug
final fix
final fix v2
\`\`\`

## 引入规范

### Commit Message 格式

\`\`\`
类型(范围): 简短描述

详细说明（可选）
\`\`\`

类型包括：feat、fix、docs、style、refactor、test、chore。

### 分支策略

- \`main\` — 生产环境
- \`develop\` — 开发主线
- \`feature/xxx\` — 功能分支
- \`hotfix/xxx\` — 紧急修复

## 效果

规范实施一个月后，代码审查效率提升了约 40%，新人上手时间减少了一半。

> 好的规范不是限制创造，而是减少沟通成本。`
  },
  {
    id:6,title:'独处的艺术',
    date:'2026-05-12',tags:['随笔'],
    excerpt:'独处不是孤独。孤独是想有人在身边而不得，独处是主动选择和自己的对话。这篇文章写给那些害怕一个人待着的人。',
    content:`## 独处不等于孤独

我们这个时代最大的悖论：人与人之间的联系前所未有地便捷，但感到孤独的人越来越多。

## 为什么需要独处

创造力需要安静。大多数重要的想法不是在开会时产生的，而是在散步、洗澡、发呆时冒出来的。

## 如何练习独处

1. 从 15 分钟开始，不看手机
2. 散步时不戴耳机，听周围的声音
3. 每周留一个下午，不安排任何社交

## 最后

> 所有伟大的思想都诞生于独处。——尼采

不必追求伟大，但至少给自己留一些安静的时间。`
  }
];

// ============ STATE ============
let currentView = 'home';
let activeTag = 'all';

// ============ RENDER ============
function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function renderHome(){
  currentView='home';
  activeTag='all';
  updateNav();
  var filtered = activeTag==='all' ? ARTICLES : ARTICLES.filter(function(a){return a.tags.includes(activeTag)});
  var allTags = [];
  ARTICLES.forEach(function(a){a.tags.forEach(function(t){if(allTags.indexOf(t)===-1)allTags.push(t)})});

  var html = '<div class="hero"><h1>闲笔</h1><p>随便写写，安静阅读。</p></div>';

  // Tag bar
  html += '<div class="tag-bar">';
  html += '<span class="tag-chip'+(activeTag==='all'?' active':'')+'" onclick="filterTag(\'all\')">全部</span>';
  allTags.forEach(function(t){
    html += '<span class="tag-chip'+(activeTag===t?' active':'')+'" onclick="filterTag(\''+t+'\')">'+t+'</span>';
  });
  html += '</div>';

  // Articles
  if(filtered.length===0){
    html += '<div class="empty-state"><p>该标签下暂无文章</p></div>';
  } else {
    html += '<div class="article-list">';
    filtered.forEach(function(a){
      html += '<div class="article-card" onclick="showArticle('+a.id+')">';
      html += '<div class="article-meta"><time>'+a.date+'</time><div class="article-meta-tags">';
      a.tags.forEach(function(t){html += '<span>'+t+'</span>'});
      html += '</div></div>';
      html += '<div class="article-title">'+escapeHtml(a.title)+'</div>';
      html += '<div class="article-excerpt">'+escapeHtml(a.excerpt)+'</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  document.getElementById('mainContent').innerHTML = html;
}

function filterTag(tag){
  activeTag=tag;
  renderHome();
}

function showArticle(id){
  currentView='article';
  updateNav();
  var a = ARTICLES.find(function(x){return x.id===id});
  if(!a)return;

  var html = '<div class="article-detail">';
  html += '<div class="back-btn" onclick="showHome()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>返回</div>';
  html += '<div class="article-title">'+escapeHtml(a.title)+'</div>';
  html += '<div class="article-meta"><time>'+a.date+'</time><div class="article-meta-tags">';
  a.tags.forEach(function(t){html += '<span>'+t+'</span>'});
  html += '</div></div>';

  // Render markdown
  try{
    var rendered = marked.parse(a.content);
    html += '<div class="article-body">'+rendered+'</div>';
  }catch(e){
    html += '<div class="article-body"><p>内容渲染失败</p></div>';
  }

  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
  window.scrollTo(0,0);
}

function showAbout(){
  currentView='about';
  updateNav();
  var html = '<div class="about-section">';
  html += '<h2>关于我</h2>';
  html += '<p>你好，我是这个博客的作者。</p>';
  html += '<p>白天写代码，晚上看书。偶尔拍照，经常发呆。</p>';
  html += '<p>这个博客记录我在<span class="highlight">技术与生活</span>之间的所思所想。</p>';
  html += '<p>没有评论功能，没有阅读量统计。如果你读到某篇文章觉得有共鸣，那就足够了。</p>';
  html += '<h2 style="margin-top:2rem">关于这个博客</h2>';
  html += '<p>纯手工搭建，HTML + CSS + JavaScript，Markdown 渲染用的 <a href="https://github.com/markedjs/marked" target="_blank">marked.js</a>。</p>';
  html += '<p>没有数据库，所有文章直接写在代码里。没有构建步骤，打开就是最终页面。</p>';
  html += '<p>喜欢这种原始感——技术越简单，越能专注于内容本身。</p>';
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
}

function showHome(){
  renderHome();
  window.scrollTo(0,0);
}

function updateNav(){
  document.querySelectorAll('.nav-links a').forEach(function(el){
    el.classList.remove('active');
  });
  var target = currentView==='about' ? 'about' : 'home';
  document.querySelector('[data-nav="'+target+'"]').classList.add('active');
}

// ============ SCROLL ============
window.addEventListener('scroll',function(){
  document.getElementById('siteNav').classList.toggle('scrolled',window.scrollY>10);
});

// ============ INIT ============
renderHome();
</script>
</body>
</html>
