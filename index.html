<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>林子航 &amp; 苏欣念</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-tap-highlight-color:transparent}

  body{
    font-family:"Noto Serif SC","PingFang SC","STSong","Songti SC",serif;
    background:#f7f3ec;
    color:#3b2d24;
    min-height:100vh;
    min-height:100dvh;
    padding:clamp(2.5rem,10vh,4.5rem) clamp(1.2rem,6vw,2.5rem);
    line-height:2.1;
  }

  .page{
    max-width:380px;margin:0 auto;
  }

  /* 日期——手写感，轻轻放在左上角 */
  .dateline{
    font-size:0.7rem;color:#9e8b7a;letter-spacing:0.05em;
    margin-bottom:clamp(2.5rem,12vh,5rem);
  }

  /* 称呼 */
  .greeting{
    font-size:clamp(2.2rem,8vw,3.4rem);font-weight:500;line-height:1.3;
    margin-bottom:1rem;
  }
  .greeting .name-zi{display:block}
  .greeting .name-xin{margin-left:0.6em;color:#6b5544}

  .amp{
    display:inline;font-family:"Georgia","Times New Roman",serif;
    font-style:italic;font-weight:400;color:#a68b7a;font-size:0.72em;
    margin:0 0.08em;vertical-align:middle;
  }

  /* 那句话 */
  .the-line{
    font-size:clamp(1rem,3.5vw,1.15rem);font-weight:500;
    color:#4a3424;letter-spacing:0.15em;
    margin-bottom:clamp(2rem,8vw,3rem);margin-top:0.3rem;
  }

  /* 留白 */
  .spacer{
    height:clamp(3rem,12vh,6rem);
  }

  /* 墨环——简单一圈，不规则断点 */
  .ink-ring{
    width:clamp(60px,16vw,80px);height:clamp(60px,16vw,80px);
    margin:0 0 clamp(2.5rem,10vh,4rem);
  }
  .ink-ring svg{width:100%;height:100%;overflow:visible}
  .ring-a{
    fill:none;stroke:#8c735e;stroke-width:0.7;
    stroke-dasharray:5 8 2 10 4 7;stroke-linecap:round;
    animation:spin 40s linear infinite;transform-origin:center;
  }
  .ring-b{
    fill:none;stroke:#a68b7a;stroke-width:0.4;
    stroke-dasharray:3 12 1 15;stroke-linecap:round;
    animation:spin 55s linear reverse infinite;transform-origin:center;
  }
  .dot{
    fill:#7a5c48;
    animation:spin 40s linear infinite;transform-origin:30px 30px;
  }
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

  /* 引语 —— 偏右一点点，打破对称 */
  .epigraph{
    font-size:0.8rem;color:#8c7b6c;line-height:2;
    margin-bottom:clamp(3rem,12vh,5rem);
    padding-left:clamp(2rem,15vw,5rem);
    font-style:italic;
  }

  /* 计数器 */
  .counter{
    padding:1.2rem 0;
    border-top:0.5px solid #d4c8bb;
    border-bottom:0.5px solid #d4c8bb;
    margin-bottom:2rem;
  }
  .counter-label{
    font-size:0.55rem;color:#a69888;letter-spacing:0.15em;margin-bottom:0.5rem;
  }
  .counter-row{
    display:flex;align-items:baseline;gap:0.3rem;
  }
  .counter-num{
    font-size:2.8rem;font-weight:300;color:#4a3424;line-height:1;
  }
  .counter-unit{
    font-size:0.75rem;color:#8c7b6c;
  }
  .counter-note{
    font-size:0.7rem;color:#a69888;margin-top:0.4rem;
  }

  .end{
    font-size:0.68rem;color:#bfb0a2;margin-top:1.5rem;
  }

  @media(prefers-reduced-motion:reduce){
    .ring-a,.ring-b,.dot{animation:none}
  }
</style>
</head>
<body>

<div class="page">

  <div class="dateline">2026 年 6 月 19 日</div>

  <div class="greeting">
    <span class="name-zi">林子航</span>
    <span class="amp" style="font-size:clamp(1.6rem,5vw,2rem);display:block;margin:0.1rem 0">&amp;</span>
    <span class="name-xin">苏欣念</span>
  </div>

  <p class="the-line">爱一生一世</p>

  <div class="spacer"></div>

  <!-- 墨环 -->
  <div class="ink-ring">
    <svg viewBox="0 0 60 60">
      <circle class="ring-a" cx="30" cy="30" r="22"/>
      <circle class="ring-b" cx="30" cy="30" r="22"/>
      <circle class="dot" cx="30" cy="8" r="1.8"/>
    </svg>
  </div>

  <p class="epigraph">斯人若彩虹<br>遇上方知有</p>

  <!-- 在一起的日子 -->
  <div class="counter">
    <div class="counter-label">在一起</div>
    <div class="counter-row">
      <span class="counter-num" id="days">0</span>
      <span class="counter-unit">天</span>
    </div>
    <div class="counter-note">从 2026.5.3 算起，每天都算数</div>
  </div>

  <p class="end">—</p>

</div>

<script>
(function(){
  var s=new Date('2026-05-03'),e=document.getElementById('days');
  function u(){var n=Math.floor((new Date()-s)/864e5);e.textContent=Math.max(0,n)}
  u();setInterval(u,6e4)
})();
</script>

</body>
</html>
