<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>林子航 &amp; 苏欣念</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-tap-highlight-color:transparent}
  body{
    font-family:"Noto Serif SC","PingFang SC","STSong",serif;
    background:oklch(0.11 0.005 20);
    color:oklch(0.88 0.005 85);
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  /* 微光渐变背景 */
  .bg-glow{
    position:fixed;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.25;
    pointer-events:none;
    z-index:0;
    animation:breathe 8s ease-in-out infinite;
  }
  .bg-glow-1{
    width:min(70vw,400px);height:min(70vw,400px);
    top:-20%;left:-15%;
    background:oklch(0.45 0.12 10);
    animation-delay:0s;
  }
  .bg-glow-2{
    width:min(50vw,300px);height:min(50vw,300px);
    bottom:-10%;right:-10%;
    background:oklch(0.4 0.14 20);
    animation-delay:4s;
  }
  @keyframes breathe{
    0%,100%{transform:scale(1);opacity:0.2}
    50%{transform:scale(1.2);opacity:0.3}
  }

  .container{
    position:relative;z-index:1;
    text-align:center;
    padding:clamp(2rem,8vw,5rem) clamp(1.2rem,5vw,2.5rem);
    width:100%;
    max-width:420px;
    animation:riseIn 1.4s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes riseIn{
    0%{opacity:0;transform:translateY(48px)}
    100%{opacity:1;transform:translateY(0)}
  }

  /* 日期行 */
  .date-line{
    font-family:"Noto Sans SC","PingFang SC",sans-serif;
    font-size:0.7rem;
    font-weight:400;
    letter-spacing:0.24em;
    text-transform:uppercase;
    color:oklch(0.45 0.02 25);
    margin-bottom:clamp(2.5rem,10vw,4rem);
  }

  /* 名字 */
  .names{
    margin-bottom:clamp(1.2rem,5vw,2rem);
    line-height:1.15;
  }
  .name{
    display:block;
    font-size:clamp(3rem,12vw,5rem);
    font-weight:600;
    letter-spacing:0.06em;
    color:oklch(0.92 0.01 85);
    line-height:1.15;
  }
  .name:first-child{margin-bottom:clamp(0.2rem,1.5vw,0.5rem)}

  /* 连接符 */
  .ampersand{
    display:block;
    font-family:"Noto Serif SC",serif;
    font-size:clamp(1.6rem,6vw,2.6rem);
    font-weight:300;
    font-style:italic;
    color:oklch(0.5 0.06 15);
    line-height:1;
    margin:clamp(0.3rem,2vw,0.8rem) 0;
    animation:pulse-opacity 3s ease-in-out infinite;
  }
  @keyframes pulse-opacity{
    0%,100%{opacity:0.5}
    50%{opacity:1}
  }

  /* 主标题 */
  .main-line{
    font-size:clamp(1.5rem,6vw,2.4rem);
    font-weight:700;
    letter-spacing:0.12em;
    margin-bottom:clamp(2.5rem,8vw,3.5rem);
    color:oklch(0.85 0.03 20);
    text-shadow:0 0 60px oklch(0.45 0.12 12 / 0.35);
  }

  /* 分割线 */
  .divider{
    width:1px;
    height:clamp(48px,12vw,72px);
    background:linear-gradient(to bottom,transparent,oklch(0.35 0.04 15),transparent);
    margin:0 auto clamp(2.5rem,8vw,3.5rem);
  }

  /* 底部文字 */
  .footer-note{
    font-family:"Noto Sans SC","PingFang SC",sans-serif;
    font-size:0.78rem;
    font-weight:300;
    letter-spacing:0.12em;
    color:oklch(0.4 0.02 20);
  }

  @media(prefers-reduced-motion:reduce){
    .bg-glow,.ampersand,.container{animation:none}
  }
</style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <main class="container">
    <p class="date-line">2026 · Forever</p>

    <div class="names">
      <span class="name">林子航</span>
      <span class="ampersand">&amp;</span>
      <span class="name">苏欣念</span>
    </div>

    <h1 class="main-line">爱一生一世</h1>

    <div class="divider"></div>

    <p class="footer-note">执子之手，与子偕老</p>
  </main>
</body>
</html>
