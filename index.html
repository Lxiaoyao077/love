<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>林子航 &amp; 苏欣念</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}

  body{
    font-family:"Noto Serif SC","PingFang SC","STSong",serif;
    background:#FFFFFF;
    color:oklch(0.22 0.02 60);
    min-height:100vh;
    min-height:100dvh;
    overflow-x:hidden;
  }

  /* 主容器 */
  .container{
    position:relative;z-index:1;
    min-height:100vh;min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:clamp(3rem,10vh,5rem) clamp(1.5rem,6vw,3rem) clamp(8rem,18vh,10rem);
    padding-bottom:120px;
  }

  /* === Hero === */
  .hero{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:100%;max-width:400px;text-align:center;
  }

  /* Hero 子元素错峰入场 */
  .hero > * {
    opacity:0;
    animation:riseIn 1.2s cubic-bezier(0.05,0.7,0.1,1) both;
    animation-fill-mode:both;
  }
  .hero > *:nth-child(1){animation-delay:0.08s}  /* top-mark */
  .hero > *:nth-child(2){animation-delay:0.18s}  /* names */
  .hero > *:nth-child(3){animation-delay:0.28s}  /* declaration */
  .hero > *:nth-child(4){animation-delay:0.40s}  /* ink-ring */
  .hero > *:nth-child(5){animation-delay:0.52s}  /* epigraph */

  @keyframes riseIn{
    0%{opacity:0;transform:translateY(48px) scale(0.96)}
    60%{opacity:0.8}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }

  .top-mark{
    display:flex;align-items:center;gap:0.6rem;margin-bottom:clamp(2.2rem,8vw,3rem);
  }
  .top-mark::before,.top-mark::after{
    content:'';display:block;width:clamp(20px,6vw,32px);height:0.5px;
    background:oklch(0.35 0.02 60 / 0.3);
  }
  .top-mark span{
    font-family:"Noto Sans SC","PingFang SC",sans-serif;
    font-size:0.58rem;font-weight:300;letter-spacing:0.4em;
    color:oklch(0.32 0.02 65);text-transform:uppercase;
  }

  .names{
    margin-bottom:clamp(0.6rem,2.5vw,1rem);line-height:1.15;
  }
  .name-line{
    font-size:clamp(2.6rem,10vw,4.6rem);font-weight:600;
    letter-spacing:0.12em;color:oklch(0.16 0.025 55);line-height:1.1;
  }
  .name-line:first-child{margin-bottom:clamp(0.05rem,0.5vw,0.2rem)}

  .connector{
    display:block;
    font-family:"Cormorant Garamond","Georgia",serif;
    font-size:clamp(1.4rem,5vw,2.4rem);font-weight:400;font-style:italic;
    color:oklch(0.38 0.04 50);line-height:1;
    margin:clamp(0.15rem,1.2vw,0.5rem) 0;
    animation:pulse-soft 4.5s ease-in-out infinite;
  }
  @keyframes pulse-soft{
    0%,100%{opacity:0.45}50%{opacity:0.85}
  }

  .declaration{
    font-size:clamp(1.2rem,4.5vw,1.75rem);font-weight:700;
    letter-spacing:0.22em;color:oklch(0.24 0.045 35);
    margin-bottom:clamp(2.5rem,9vw,3.5rem);
  }

  /* 墨环 */
  .ink-ring{
    position:relative;width:clamp(70px,18vw,100px);height:clamp(70px,18vw,100px);
    margin:0 auto clamp(2.5rem,9vw,3.5rem);
  }
  .ink-ring svg{width:100%;height:100%;overflow:visible}
  .ring-path{
    fill:none;stroke:oklch(0.3 0.035 45 / 0.24);stroke-width:0.6;
    stroke-dasharray:4 6;animation:spin-slow 60s linear infinite;
    transform-origin:center;filter:url(#ink-bleed);
  }
  .ring-path:nth-child(2){
    animation-duration:75s;animation-direction:reverse;
    stroke:oklch(0.28 0.03 50 / 0.15);stroke-dasharray:2 10;stroke-width:0.4;
  }
  .ring-dot{
    position:absolute;width:3.5px;height:3.5px;border-radius:50%;
    background:oklch(0.35 0.05 40);top:-2px;left:50%;transform:translateX(-50%);
    box-shadow:0 0 8px oklch(0.4 0.06 35 / 0.2),0 0 2px oklch(0.3 0.04 40 / 0.4);
    animation:spin 60s linear infinite;transform-origin:50% calc(50% + 2px);
  }
  @keyframes spin{0%{transform:translateX(-50%) rotate(0deg)}100%{transform:translateX(-50%) rotate(360deg)}}
  @keyframes spin-slow{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

  .epigraph{
    font-size:clamp(0.78rem,2.8vw,0.9rem);font-weight:300;
    color:oklch(0.34 0.02 60);letter-spacing:0.1em;line-height:1.9;
    font-style:italic;
  }
  .epigraph .decor{
    display:block;font-size:0.42rem;color:oklch(0.3 0.03 55);
    letter-spacing:0.35em;margin-top:0.5rem;font-style:normal;
  }

  /* 下滑提示 */
  .scroll-note{
    position:absolute;bottom:clamp(1.5rem,5vw,2.5rem);left:50%;
    transform:translateX(-50%);animation:floatDown 3s ease-in-out infinite;
  }
  .scroll-note span{
    display:block;width:0.5px;
    height:clamp(28px,7vw,40px);
    background:linear-gradient(to bottom,transparent,oklch(0.3 0.02 60 / 0.35),transparent);
  }
  @keyframes floatDown{
    0%,100%{opacity:0.2;transform:translateX(-50%) translateY(-3px)}
    50%{opacity:1;transform:translateX(-50%) translateY(3px)}
  }

  /* === 计数器区 === */
  .counter-section{
    width:100%;max-width:380px;text-align:center;
    padding:clamp(1.5rem,5vw,2.5rem) clamp(1rem,4vw,2rem);
    border-radius:16px;
    background:rgba(245,245,245,0.6);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    box-shadow:0 1px 2px rgba(0,0,0,0.04),0 2px 8px rgba(0,0,0,0.03);
    opacity:0;
    transform:translateY(48px);
    transition:opacity 0.9s cubic-bezier(0.05,0.7,0.1,1), transform 0.9s cubic-bezier(0.05,0.7,0.1,1);
  }
  .counter-section.revealed{
    opacity:1;
    transform:translateY(0);
  }

  .counter-label{
    font-family:"Noto Sans SC","PingFang SC",sans-serif;
    font-size:0.58rem;letter-spacing:0.3em;
    color:oklch(0.3 0.02 65);margin-bottom:0.8rem;
  }
  .counter-row{
    display:flex;justify-content:center;align-items:baseline;gap:clamp(0.25rem,1.5vw,0.5rem);
  }
  .counter-num{
    font-family:"Cormorant Garamond","Georgia",serif;
    font-size:clamp(2.2rem,7.5vw,3.2rem);font-weight:600;
    color:oklch(0.2 0.035 45);
  }
  .counter-unit{
    font-family:"Noto Sans SC","PingFang SC",sans-serif;
    font-size:0.68rem;color:oklch(0.3 0.025 60);letter-spacing:0.12em;
  }
  .counter-note{
    font-size:0.68rem;color:oklch(0.32 0.02 60);letter-spacing:0.08em;
    margin-top:0.6rem;
  }

  .footer-sep{
    margin-top:clamp(2rem,6vw,3rem);
    width:clamp(40px,10vw,60px);height:0.5px;
    background:oklch(0.35 0.02 60 / 0.25);
  }

  /* ==================== 底部液态玻璃导航栏 ==================== */
  .glass-nav{
    position:fixed;
    bottom:max(20px, env(safe-area-inset-bottom, 20px));
    left:50%;
    transform:translateX(-50%);
    z-index:100;
    display:flex;
    align-items:center;
    gap:clamp(6px,2vw,12px);
    padding:6px clamp(10px,3vw,16px);
    height:56px;
    border-radius:30px;

    /* 入场动画 - 底部弹入 + 过冲回弹 */
    opacity:0;
    transform:translateX(-50%) translateY(24px) scale(0.92);
    animation:navEnter 0.8s 0.65s cubic-bezier(0.05,0.7,0.1,1) forwards;

    /* 多层玻璃结构 */
    background:rgba(255,255,255,0.52);
    backdrop-filter:blur(32px) saturate(2.2);
    -webkit-backdrop-filter:blur(32px) saturate(2.2);

    /* 边框 - 内外双层高光 */
    border:0.5px solid rgba(255,255,255,0.7);
    outline:0.5px solid rgba(255,255,255,0.25);
    outline-offset:-3px;

    /* 阴影层次 - 模拟真实玻璃悬浮 */
    box-shadow:
      0 0 0 0.5px rgba(255,255,255,0.9) inset,
      0 2px 0 0 rgba(255,255,255,0.4) inset,
      0 8px 32px rgba(0,0,0,0.06),
      0 2px 8px rgba(0,0,0,0.04),
      0 0 0 0.5px rgba(0,0,0,0.03);

    /* 微妙模糊纹理叠加 */
    position:relative;
  }

  @keyframes navEnter{
    0%{opacity:0;transform:translateX(-50%) translateY(24px) scale(0.92)}
    55%{opacity:1;transform:translateX(-50%) translateY(-3px) scale(1.01)}
    75%{transform:translateX(-50%) translateY(1px) scale(0.995)}
    100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  }

  /* 顶部反射高光条 */
  .glass-nav::before{
    content:'';
    position:absolute;
    top:3px;
    left:12px;
    right:12px;
    height:0.5px;
    background:linear-gradient(
      90deg,
      transparent 0%,
      rgba(255,255,255,0.5) 20%,
      rgba(255,255,255,0.9) 50%,
      rgba(255,255,255,0.5) 80%,
      transparent 100%
    );
    pointer-events:none;
    z-index:2;
  }

  /* 底部微光 */
  .glass-nav::after{
    content:'';
    position:absolute;
    bottom:2px;
    left:20px;
    right:20px;
    height:1px;
    background:linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.3) 30%,
      rgba(255,255,255,0.3) 70%,
      transparent
    );
    pointer-events:none;
    z-index:2;
  }

  /* 暖色光晕动画层 */
  .glass-chroma{
    position:absolute;
    inset:0;
    border-radius:30px;
    pointer-events:none;
    z-index:1;
    opacity:0.35;
    background:radial-gradient(
      ellipse 120% 80% at 50% 50%,
      rgba(245,200,180,0.25) 0%,
      rgba(240,180,160,0.1) 40%,
      transparent 70%
    );
    animation:chromaShift 8s ease-in-out infinite;
  }
  @keyframes chromaShift{
    0%,100%{opacity:0.25;transform:scale(1)}
    33%{opacity:0.45;transform:scale(1.02)}
    66%{opacity:0.2;transform:scale(0.98)}
  }

  /* 导航项 */
  .nav-item{
    position:relative;
    z-index:3;
    display:flex;
    align-items:center;
    justify-content:center;
    width:44px;
    height:44px;
    border-radius:50%;
    transition:color 0.35s cubic-bezier(0.05,0.7,0.1,1);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    color:oklch(0.4 0.02 60);
    opacity:0.38;
  }

  .nav-item:active{
    transform:scale(0.85);
    transition:transform 0.15s cubic-bezier(0.3,0,1,1);
  }

  /* 选中态文字颜色 */
  .nav-item.active{
    opacity:1;
    color:oklch(0.22 0.04 40);
  }

  /* 滑动指示器 - 胶囊背景 */
  .nav-indicator{
    position:absolute;
    z-index:2;
    height:44px;
    border-radius:22px;
    background:rgba(245,240,235,0.7);
    pointer-events:none;
    transition:left 0.45s cubic-bezier(0.05,0.7,0.1,1),
               width 0.45s cubic-bezier(0.05,0.7,0.1,1);
  }

  /* 主页图标居中放大 */
  .nav-item.home{
    width:48px;
    height:48px;
    margin:0 -4px;
  }

  .nav-item svg{
    width:22px;
    height:22px;
    transition:transform 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  .nav-item.home svg{width:26px;height:26px}
  .nav-item.active svg{transform:scale(1.05)}

  /* 标签提示 */
  .nav-label{
    position:absolute;
    bottom:-18px;
    left:50%;
    transform:translateX(-50%) translateY(4px);
    font-family:"Noto Sans SC","PingFang SC",sans-serif;
    font-size:0.5rem;
    font-weight:400;
    letter-spacing:0.05em;
    white-space:nowrap;
    opacity:0;
    transition:all 0.35s cubic-bezier(0.22,1,0.36,1);
    pointer-events:none;
  }
  .nav-item.active .nav-label{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  @media(prefers-reduced-motion:reduce){
    .hero > *,.glass-nav{animation:none;opacity:1;transform:none}
    .counter-section{opacity:1;transform:none;transition:none}
    .connector,.ring-path,.ring-dot,.glass-chroma{animation:none}
    .nav-indicator{transition:none}
  }
</style>
</head>
<body>

<div class="container">
  <!-- Hero -->
  <section class="hero">
    <div class="top-mark"><span>一 生 一 世</span></div>

    <div class="names">
      <p class="name-line">林子航</p>
      <span class="connector">&amp;</span>
      <p class="name-line">苏欣念</p>
    </div>

    <p class="declaration">爱一生一世</p>

    <div class="ink-ring">
      <svg viewBox="0 0 100 100">
        <defs>
          <filter id="ink-bleed">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.6" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>
        <circle class="ring-path" cx="50" cy="50" r="34"/>
        <circle class="ring-path" cx="50" cy="50" r="34"/>
      </svg>
      <div class="ring-dot"></div>
    </div>

    <p class="epigraph">
      斯人若彩虹，遇上方知有
      <span class="decor">— 仅献给此生挚爱</span>
    </p>
  </section>

  <div class="scroll-note"><span></span></div>

  <!-- 在一起的日子 -->
  <section class="counter-section">
    <p class="counter-label">L O V E &nbsp; S I N C E</p>
    <div class="counter-row">
      <span class="counter-num" id="days">0</span>
      <span class="counter-unit">天</span>
    </div>
    <p class="counter-note">从这一天起，每一天都算数</p>
  </section>

  <div class="footer-sep"></div>
</div>

<!-- 底部导航栏 -->
<nav class="glass-nav" id="glassNav">
  <div class="glass-chroma"></div>
  <div class="nav-indicator" id="navIndicator"></div>

  <div class="nav-item" data-tab="flip">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <rect x="5" y="5" width="14" height="14" rx="2"/>
      <line x1="12" y1="7" x2="12" y2="17"/>
      <line x1="12" y1="12" x2="6" y2="12"/>
      <line x1="12" y1="12" x2="18" y2="12"/>
    </svg>
    <span class="nav-label">翻牌</span>
  </div>

  <div class="nav-item" data-tab="scratch">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9"/>
    </svg>
    <span class="nav-label">刮刮</span>
  </div>

  <div class="nav-item home active" data-tab="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
      <polyline points="9,21 9,13 15,13 15,21"/>
    </svg>
    <span class="nav-label">主页</span>
  </div>

  <div class="nav-item" data-tab="quiz">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/>
      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
      <circle cx="12" cy="17" r="0.8" fill="currentColor" stroke="none"/>
    </svg>
    <span class="nav-label">问答</span>
  </div>

  <div class="nav-item" data-tab="wish">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2C8 6 2 8 2 12c0 3 2 5 5 6l-1 4 4-2c1 0.5 2 1 4 1s3-0.5 4-1l4 2-1-4c3-1 5-3 5-6 0-4-6-6-10-10z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    <span class="nav-label">许愿</span>
  </div>
</nav>

<svg width="0" height="0" style="position:absolute">
  <filter id="ink-bleed-global">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.6" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>

<script>
  (function(){
    const start = new Date('2026-05-03');
    const el = document.getElementById('days');
    const update = () => {
      const now = new Date();
      const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
      el.textContent = Math.max(0, diff);
    };
    update();
    setInterval(update, 60000);
  })();

  /* 滚动触发计数器揭示 */
  (function(){
    const counter = document.querySelector('.counter-section');
    if(!counter) return;

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting){
          entry.target.classList.add('revealed');
          observer.unobserve(entry.target);
        }
      });
    },{threshold:0.2,rootMargin:'0px 0px -40px 0px'});

    observer.observe(counter);
  })();

  /* 底部导航 - 滑动指示器 + 切换逻辑 */
  (function(){
    const nav = document.getElementById('glassNav');
    const indicator = document.getElementById('navIndicator');
    const items = nav.querySelectorAll('.nav-item');
    let activeItem = nav.querySelector('.nav-item.active');

    /* 初始化指示器位置 */
    function moveIndicator(target){
      const navRect = nav.getBoundingClientRect();
      const targetRect = target.getBoundingClientRect();
      const left = targetRect.left - navRect.left;
      const width = targetRect.width;
      indicator.style.left = left + 'px';
      indicator.style.width = width + 'px';
    }

    /* 页面加载后定位指示器 */
    if(activeItem){
      requestAnimationFrame(() => {
        requestAnimationFrame(() => moveIndicator(activeItem));
      });
    }

    items.forEach(item => {
      item.addEventListener('click', function(e){
        e.preventDefault();
        const tab = this.dataset.tab;

        /* 更新选中态 */
        items.forEach(i => i.classList.remove('active'));
        this.classList.add('active');
        activeItem = this;

        /* 滑动指示器 */
        moveIndicator(this);

        /* 轻触倾斜反馈 */
        this.style.transform = 'scale(0.85)';
        setTimeout(() => { this.style.transform = ''; }, 150);

        if(tab === 'home'){
          window.scrollTo({top:0, behavior:'smooth'});
        } else {
          /* 功能占位 - 轻提示 */
          const label = this.querySelector('.nav-label');
          if(label){
            const orig = label.textContent;
            label.textContent = '即将开放';
            label.style.opacity = '1';
            label.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(() => {
              label.textContent = orig;
              label.style.opacity = '';
              label.style.transform = '';
            },1200);
          }
        }
      });
    });

    /* 窗口尺寸变化时重新定位 */
    window.addEventListener('resize', () => {
      if(activeItem) moveIndicator(activeItem);
    });
  })();
</script>

</body>
</html>
