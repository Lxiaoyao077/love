<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>林子航 &amp; 苏欣念</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-tap-highlight-color:transparent;height:100%}

  :root{
    --nav-height:56px;
    --nav-corner:28px;
    --nav-h-pad:36px;
  }

  body{
    font-family:"Noto Serif SC","PingFang SC","STSong","Songti SC",serif;
    background:#f7f3ec;
    color:#3b2d24;
    min-height:100vh;
    min-height:100dvh;
    /* 为悬浮底栏留空间 */
    padding-bottom:calc(var(--nav-height) + 48px + env(safe-area-inset-bottom, 0px));
    line-height:2.1;
  }

  /* === 面板 === */
  .panel{display:none}
  .panel.active{display:block}

  /* === 主页 === */
  #panelHome{padding:clamp(2.5rem,10vh,4.5rem) clamp(1.2rem,6vw,2.5rem)}
  #panelHome .page{max-width:380px;margin:0 auto}

  .dateline{font-size:0.7rem;color:#9e8b7a;letter-spacing:0.05em;margin-bottom:clamp(2.5rem,12vh,5rem)}
  .greeting{font-size:clamp(2.2rem,8vw,3.4rem);font-weight:500;line-height:1.3;margin-bottom:1rem}
  .greeting .name-zi{display:block}
  .greeting .name-xin{margin-left:0.6em;color:#6b5544}
  .the-line{font-size:clamp(1rem,3.5vw,1.15rem);font-weight:500;color:#4a3424;letter-spacing:0.15em;margin-bottom:clamp(2rem,8vw,3rem);margin-top:0.3rem}
  .spacer{height:clamp(3rem,12vh,6rem)}

  .ink-ring{width:clamp(60px,16vw,80px);height:clamp(60px,16vw,80px);margin:0 0 clamp(2.5rem,10vh,4rem)}
  .ink-ring svg{width:100%;height:100%;overflow:visible}
  .ring-a{fill:none;stroke:#8c735e;stroke-width:0.7;stroke-dasharray:5 8 2 10 4 7;stroke-linecap:round;animation:spin 40s linear infinite;transform-origin:center}
  .ring-b{fill:none;stroke:#a68b7a;stroke-width:0.4;stroke-dasharray:3 12 1 15;stroke-linecap:round;animation:spin 55s linear reverse infinite;transform-origin:center}
  .ring-dot{fill:#7a5c48;animation:spin 40s linear infinite;transform-origin:30px 30px}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

  .epigraph{font-size:0.8rem;color:#8c7b6c;line-height:2;margin-bottom:clamp(3rem,12vh,5rem);padding-left:clamp(2rem,15vw,5rem);font-style:italic}
  .counter{padding:1.2rem 0;border-top:0.5px solid #d4c8bb;border-bottom:0.5px solid #d4c8bb;margin-bottom:1.5rem}
  .counter-label{font-size:0.55rem;color:#a69888;letter-spacing:0.15em;margin-bottom:0.5rem}
  .counter-row{display:flex;align-items:baseline;gap:0.3rem}
  .counter-num{font-size:2.8rem;font-weight:300;color:#4a3424;line-height:1}
  .counter-unit{font-size:0.75rem;color:#8c7b6c}
  .counter-note{font-size:0.7rem;color:#a69888;margin-top:0.4rem}
  .end-mark{font-size:0.68rem;color:#bfb0a2;margin-top:1.5rem}

  /* === 游戏面板 === */
  .game-panel{text-align:center;padding:clamp(3rem,12vh,5rem) clamp(1.2rem,6vw,2.5rem) clamp(4rem,14vh,6rem)}
  .game-head{font-size:0.6rem;color:#bfb0a2;letter-spacing:0.2em;margin-bottom:2rem}

  /* 记忆翻牌 */
  .card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;max-width:300px;margin:0 auto}
  .card{aspect-ratio:1;perspective:400px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
  .card-inner{position:relative;width:100%;height:100%;transition:transform 0.35s ease;transform-style:preserve-3d}
  .card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
  .card-face{position:absolute;inset:0;border-radius:4px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden}
  .card-back{background:#e8e0d6;border:0.5px solid #d4c8bb;font-size:0.55rem;color:#bfb0a2}
  .card-front{background:#f0e8db;border:0.5px solid #d4c8bb;transform:rotateY(180deg);font-size:1.6rem}
  .card.matched .card-face{border-color:#c4a88c;background:#ede0d2}
  .match-msg{text-align:center;font-size:0.7rem;color:#8c7b6c;margin-top:1.2rem;display:none}
  .match-msg.show{display:block}
  .match-msg button{background:none;border:0.5px solid #c4a88c;color:#8c7b6c;font-family:inherit;font-size:0.65rem;padding:0.3rem 1.2rem;border-radius:2px;margin-top:0.5rem;cursor:pointer}

  /* 刮刮卡 */
  .scratch-wrap{max-width:300px;margin:0 auto}
  .scratch-card{position:relative;display:inline-block;border-radius:2px;overflow:hidden}
  .scratch-card canvas{display:block;border-radius:2px}
  .scratch-reveal{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(0.9rem,3.5vw,1rem);color:#6b5544;letter-spacing:0.08em;background:#f0e8db;pointer-events:none;text-align:center;line-height:1.6;padding:1rem}
  .scratch-hint{font-size:0.58rem;color:#c4b8ab;margin-top:0.5rem}

  /* ============================================
     MIUIX FloatingNavigationBar — 液态玻璃胶囊
     ============================================ */
  .tab-bar{
    position:fixed;bottom:24px;left:50%;z-index:100;
    transform:translateX(-50%);
    height:var(--nav-height);
    padding:0 12px;
    margin-bottom:env(safe-area-inset-bottom, 0);
    display:flex;align-items:center;gap:6px;

    /* 胶囊圆角 */
    border-radius:var(--nav-corner);

    /* 玻璃底 */
    background:rgba(255,255,255,0.62);

    /* 三层模糊叠加 — 模拟镜头折射 */
    backdrop-filter:blur(24px) saturate(1.3);
    -webkit-backdrop-filter:blur(24px) saturate(1.3);

    /* 外阴影 — shadowElevation */
    box-shadow:
      0 2px 16px rgba(0,0,0,0.07),
      0 0.5px 0.5px rgba(0,0,0,0.04);

    /* 边框高光 — 镜头折射 */
    border:0.5px solid rgba(255,255,255,0.45);

    /* 内高光 — 模拟光在玻璃内部反射 */
    box-shadow:
      0 2px 16px rgba(0,0,0,0.07),
      0 0.5px 0.5px rgba(0,0,0,0.04),
      inset 0 0.5px 0 rgba(255,255,255,0.7),
      inset 0 -0.5px 0 rgba(0,0,0,0.04);
  }

  /* 顶部高光反射条 — 玻璃表面的 specular highlight */
  .tab-bar::before{
    content:'';position:absolute;top:0;left:12px;right:12px;
    height:0.5px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6) 30%,rgba(255,255,255,0.8) 50%,rgba(255,255,255,0.6) 70%,transparent);
    border-radius:1px;
    pointer-events:none;
    z-index:2;
  }

  /* 色彩振动层 — 微妙色相偏移动画 */
  .tab-bar::after{
    content:'';position:absolute;inset:1px;border-radius:calc(var(--nav-corner) - 1px);
    background:linear-gradient(135deg,rgba(180,160,140,0.08) 0%,transparent 50%,rgba(200,185,165,0.06) 100%);
    animation:chromaShift 8s ease-in-out infinite alternate;
    pointer-events:none;z-index:1;
  }
  @keyframes chromaShift{
    0%{opacity:0.4}100%{opacity:0.85}
  }

  /* 导航项 */
  .tab-item{
    position:relative;z-index:3;
    width:44px;height:44px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;
    /* 未选中 — Miuix UnselectedAlpha */
    opacity:0.38;
    transition:opacity 0.25s,background 0.25s;
    color:#3b2d24;
  }
  .tab-item.active{
    opacity:1;
    /* 选中背景 — 微妙的毛玻璃圆底 */
    background:rgba(107,85,68,0.08);
  }
  .tab-item:active{
    opacity:0.5;
    transition:opacity 0.05s;
  }
  .tab-item.active:active{
    opacity:0.6;
  }
  .tab-icon{
    width:28px;height:28px;
    display:flex;align-items:center;justify-content:center;
  }
  .tab-icon svg{
    width:28px;height:28px;
    transition:transform 0.2s ease;
  }
  .tab-item.active .tab-icon svg{
    transform:scale(1.08);
  }

  @media(prefers-reduced-motion:reduce){
    .ring-a,.ring-b,.ring-dot{animation:none}
    .card-inner{transition:none}
    .tab-item,.tab-item.active .tab-icon svg{transition:none}
    .tab-bar::after{animation:none;opacity:0.6}
  }
</style>
</head>
<body>

<!-- ============ 主页 ============ -->
<div class="panel active" id="panelHome">
  <div class="page">
    <div class="dateline">2026 年 6 月 19 日</div>
    <div class="greeting">
      <span class="name-zi">林子航</span>
      <span style="font-family:Georgia,serif;font-style:italic;color:#a68b7a;font-size:clamp(1.6rem,5vw,2rem);display:block;margin:0.1rem 0">&amp;</span>
      <span class="name-xin">苏欣念</span>
    </div>
    <p class="the-line">爱一生一世</p>
    <div class="spacer"></div>
    <div class="ink-ring">
      <svg viewBox="0 0 60 60">
        <circle class="ring-a" cx="30" cy="30" r="22"/>
        <circle class="ring-b" cx="30" cy="30" r="22"/>
        <circle class="ring-dot" cx="30" cy="8" r="1.8"/>
      </svg>
    </div>
    <p class="epigraph">斯人若彩虹<br>遇上方知有</p>
    <div class="counter">
      <div class="counter-label">在一起</div>
      <div class="counter-row">
        <span class="counter-num" id="days">0</span>
        <span class="counter-unit">天</span>
      </div>
      <div class="counter-note">从 2026.5.3 算起，每天都算数</div>
    </div>
    <p class="end-mark">—</p>
  </div>
</div>

<!-- ============ 翻牌 ============ -->
<div class="panel game-panel" id="panelCards">
  <p class="game-head">· 记 忆 翻 牌 ·</p>
  <div class="card-grid" id="board"></div>
  <div class="match-msg" id="matchMsg">全找到啦，运气真好<br><button onclick="initCards()">再来一次</button></div>
</div>

<!-- ============ 刮刮卡 ============ -->
<div class="panel game-panel" id="panelScratch">
  <p class="game-head">· 刮 刮 卡 ·</p>
  <div class="scratch-wrap">
    <div class="scratch-card">
      <div class="scratch-reveal">你是此生<br>最幸运的遇见</div>
      <canvas id="scratchCanvas"></canvas>
    </div>
    <p class="scratch-hint">手指划过灰色区域</p>
  </div>
</div>

<!-- ============ 悬浮胶囊底栏 ============ -->
<nav class="tab-bar" id="tabBar">
  <div class="tab-item active" data-tab="home">
    <div class="tab-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 10l9-8 9 8"/><path d="M5 9v10h4v-6h6v6h4V9"/>
      </svg>
    </div>
  </div>
  <div class="tab-item" data-tab="cards">
    <div class="tab-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="13" height="16" rx="2"/><rect x="8" y="4" width="13" height="16" rx="2"/>
      </svg>
    </div>
  </div>
  <div class="tab-item" data-tab="scratch">
    <div class="tab-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1.5l2.2 6.8h7.1l-5.7 4.2 2.2 6.7L12 15l-5.8 4.2 2.2-6.7-5.7-4.2h7.1z"/>
      </svg>
    </div>
  </div>
</nav>

<script>
// === 计数器 ===
(function(){
  var s=new Date('2026-05-03'),e=document.getElementById('days');
  function u(){var n=Math.floor((new Date()-s)/864e5);e.textContent=Math.max(0,n)}
  u();setInterval(u,6e4)
})();

// === 底栏切换 ===
(function(){
  var panels={
    home:document.getElementById('panelHome'),
    cards:document.getElementById('panelCards'),
    scratch:document.getElementById('panelScratch')
  };
  document.querySelectorAll('.tab-item').forEach(function(t){
    t.addEventListener('click',function(){
      var name=this.dataset.tab;
      document.querySelectorAll('.tab-item').forEach(function(x){x.classList.remove('active')});
      this.classList.add('active');
      Object.keys(panels).forEach(function(k){panels[k].classList.remove('active')});
      panels[name].classList.add('active');
      if(name==='scratch'&&!window._scratchReady)initScratch();
    });
  });
})();

// === 记忆翻牌 ===
var emojis=['💕','💖','💗','💘'],cardData=[],flipped=[],locked=false,matched=0;
var board=document.getElementById('board'),msg=document.getElementById('matchMsg');

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

function initCards(){
  cardData=shuffle([...emojis,...emojis]);flipped=[];locked=false;matched=0;msg.classList.remove('show');
  board.innerHTML='';
  cardData.forEach(function(emoji,i){
    var c=document.createElement('div');c.className='card';c.dataset.i=i;
    c.innerHTML='<div class="card-inner"><div class="card-face card-back">?</div><div class="card-face card-front">'+emoji+'</div></div>';
    c.addEventListener('click',function(){flip(i)});
    board.appendChild(c);
  });
}

function flip(i){
  if(locked)return;
  var c=board.children[i];
  if(c.classList.contains('flipped')||c.classList.contains('matched'))return;
  c.classList.add('flipped');flipped.push(i);
  if(flipped.length===2){
    locked=true;var a=flipped[0],b=flipped[1];
    if(cardData[a]===cardData[b]){
      board.children[a].classList.add('matched');
      board.children[b].classList.add('matched');
      matched+=2;flipped=[];locked=false;
      if(matched===8)msg.classList.add('show');
    }else{
      setTimeout(function(){
        board.children[a].classList.remove('flipped');
        board.children[b].classList.remove('flipped');
        flipped=[];locked=false;
      },700);
    }
  }
}

initCards();

// === 刮刮卡 ===
function initScratch(){
  window._scratchReady=true;
  var canvas=document.getElementById('scratchCanvas');
  var w=Math.min(canvas.parentElement.clientWidth||300,300);
  var h=Math.round(w*0.44);
  canvas.width=w;canvas.height=h;
  canvas.style.width=w+'px';canvas.style.height=h+'px';

  var ctx=canvas.getContext('2d');
  ctx.fillStyle='#c4b8ab';ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#d4c8bb';ctx.font='0.55rem "Noto Serif SC",serif';ctx.textAlign='center';
  ctx.fillText('· 刮 开 这 里 ·',w/2,h/2);

  var drawing=false;
  function scratch(e){
    e.preventDefault();
    var rect=canvas.getBoundingClientRect();
    var x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    var y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath();ctx.arc(x,y,22,0,Math.PI*2);ctx.fill();
  }
  canvas.addEventListener('touchstart',function(e){drawing=true;scratch(e)});
  canvas.addEventListener('touchmove',function(e){if(drawing)scratch(e)});
  canvas.addEventListener('touchend',function(){drawing=false});
  canvas.addEventListener('mousedown',function(e){drawing=true;scratch(e)});
  canvas.addEventListener('mousemove',function(e){if(drawing)scratch(e)});
  canvas.addEventListener('mouseup',function(){drawing=false});
  canvas.addEventListener('mouseleave',function(){drawing=false});
}
</script>

</body>
</html>
